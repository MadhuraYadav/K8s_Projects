apiVersion: apps/v1
kind: Deployment
metadata: 
  name: sample-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-pods
  template:
    metadata:
      name: sample-app
      labels:
        app: sample-pods
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
          - containerPort: 80